# =============================================================================
# Bag of Words — Helm Chart Default Values
# =============================================================================

# -- Container image
image:
  repository: bagofwords/bagofwords
  tag: latest
  pullPolicy: Always

# -- Override chart name / full name
nameOverride: ""
fullnameOverride: ""

# -- Replica count (ignored when autoscaling.enabled is true)
replicaCount: 1

# -- Public-facing hostname (used by Ingress / HTTPRoute)
host: app.bagofwords.com

# =============================================================================
# Service Account
# =============================================================================
# -- Service account configuration
serviceAccount:
  # -- Create the ServiceAccount. Set to false to use an existing one.
  create: true
  # -- ServiceAccount name. Defaults to the release fullname.
  name: bowapp
  # -- Annotations to add to the ServiceAccount (e.g. IRSA role ARN)
  annotations: {}
  # -- Name of an existing imagePullSecret to attach to the SA. Leave empty to skip.
  imagePullSecret: ""

# =============================================================================
# Resources
# =============================================================================
# -- CPU/memory requests and limits for the main container
resources:
  requests:
    cpu: "1"
    memory: 1500Mi
  limits:
    cpu: "2"
    memory: 2Gi

# =============================================================================
# Health Probes — all three target GET /health on port 3000
# =============================================================================
# -- Startup probe (allows slow first boot — up to 5 minutes)
startupProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 30
  timeoutSeconds: 5

# -- Readiness probe
readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 5
  timeoutSeconds: 5

# -- Liveness probe
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 5
  timeoutSeconds: 5

# =============================================================================
# Security Context
# NOTE: readOnlyRootFilesystem MUST be false — the app writes to
#       /app/backend/uploads/ and /app/backend/logs at runtime.
# =============================================================================
# -- Security context applied to the main container
containerSecurityContext:
  runAsNonRoot: false
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

# -- Security context applied to the pod
podSecurityContext:
  fsGroup: 1000

# =============================================================================
# Node Scheduling
# =============================================================================
# -- Node selector for the app pod. Example: `karpenter.sh/nodepool: general-apps`
nodeSelector: {}

# -- Tolerations for the app pod
tolerations: []

# -- Affinity rules for the app pod
affinity: {}

# =============================================================================
# Pod Metadata
# =============================================================================
# -- Annotations added to every pod. Example: `reloader.stakater.com/auto: "true"`
podAnnotations: {}

# -- Extra labels added to every pod
podLabels: {}

# -- Extra labels added to every resource
commonLabels: {}

# =============================================================================
# Environment Variables
# Supports plain values, secretKeyRef, and configMapKeyRef.
#
# Plain value:
#   - name: MY_VAR
#     value: "plain"
#
# From a Secret:
#   - name: BOW_ENTRA_CLIENT_ID
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: ENTRA_CLIENT_ID
# =============================================================================
# -- Extra environment variables injected into the container (plain values or valueFrom references)
env: []

# -- Inject all keys from existing Secrets as env vars (envFrom secretRef)
envFromSecrets: []

# -- Inject all keys from existing ConfigMaps as env vars (envFrom configMapRef)
envFromConfigMaps: []

# =============================================================================
# Database
# When postgres.enabled=true and externalDatabase.enabled=false,
# BOW_DATABASE_URL is automatically injected into the Deployment.
#
# For an external DB: set postgres.enabled=false, externalDatabase.enabled=true,
# and supply BOW_DATABASE_URL via env[] (plain value or secretKeyRef).
# =============================================================================
# -- Set to true when using an external database instead of the bundled subchart
externalDatabase:
  enabled: false

# =============================================================================
# Application Configuration (bow-config.yaml)
# Rendered into a ConfigMap and mounted at /app/bow-config.yaml.
#
# IMPORTANT: Sensitive fields (encryptionKey, OIDC clientSecret, SMTP password)
# should use ${ENV_VAR} placeholders. The application resolves them at runtime
# from env vars injected via env[] / envFromSecrets[]. This keeps secrets out
# of the ConfigMap (which is unencrypted in etcd).
# =============================================================================
# -- Application configuration rendered into bow-config.yaml
config:
  # -- Public base URL shown in emails and redirect URIs
  baseUrl: "http://localhost:3000"

  # -- Feature flags
  features:
    # -- Allow users to sign up without an invitation
    allowUninvitedSignups: false
    # -- Allow creating multiple organizations
    allowMultipleOrganizations: false
    # -- Require email verification on sign-up
    verifyEmails: false

  # -- Authentication mode: `hybrid` (local + SSO), `local_only`, or `sso_only`
  auth:
    mode: "hybrid"

  # -- Google OAuth2 settings
  googleOAuth:
    enabled: false
    clientId: ""
    # -- Use `${BOW_GOOGLE_CLIENT_SECRET}` to pull from an env var / Secret
    clientSecret: ""

  # -- Fernet encryption key for sensitive DB data. Use `${BOW_ENCRYPTION_KEY}` in production.
  encryptionKey: "${BOW_ENCRYPTION_KEY}"

  # -- Intercom chat widget
  intercom:
    enabled: false

  # -- Telemetry / usage analytics
  telemetry:
    enabled: true

  # -- Enterprise license key. Use `${BOW_LICENSE_KEY}` to pull from env at runtime.
  licenseKey: ""

  # -- SMTP settings for transactional email
  smtp:
    # -- Set to true to enable the smtp_settings block in bow-config.yaml
    enabled: false
    host: ""
    port: 587
    username: ""
    # -- Use `${BOW_SMTP_PASSWORD}` in production
    password: ""
    fromName: "Bag of Words"
    fromEmail: ""
    useTls: true
    useSsl: false
    useCredentials: true
    validateCerts: true

  # -- OIDC provider list. clientId and clientSecret should use `${ENV_VAR}` placeholders.
  # @default -- `[]` — see values.yaml for a Microsoft Entra ID example
  oidcProviders: []
  # Example — Microsoft Entra ID:
  # - name: microsoft
  #   enabled: true
  #   issuer: "https://login.microsoftonline.com/<tenant-id>/v2.0"
  #   clientId: "${BOW_ENTRA_CLIENT_ID}"
  #   clientSecret: "${BOW_ENTRA_CLIENT_SECRET}"
  #   scopes: [openid, profile, email]
  #   pkce: true
  #   clientAuthMethod: basic
  #   discovery: true
  #   uidClaim: sub

# =============================================================================
# Managed database with IAM auth
# Alternative to the bundled postgres subchart for cloud-managed databases.
# Set postgres.enabled=false and externalDatabase.enabled=true when using this.
# provider: password | aws_iam
# =============================================================================
# -- External managed database settings (Aurora / RDS). Used when `externalDatabase.enabled=true`.
database:
  # -- Auth method and cloud settings
  auth:
    # -- `password` for static credentials, `aws_iam` for IAM token auth
    provider: password
    # -- AWS region for IAM token generation (AWS only)
    region: ""
    # -- SSL mode, e.g. `require` or `verify-full` (required for IAM auth)
    sslMode: ""
  # -- Database host / cluster endpoint
  host: ""
  port: 5432
  # -- Database user (must have `GRANT rds_iam` for AWS IAM auth)
  username: ""
  # -- Database name
  name: ""

# =============================================================================
# Service
# =============================================================================
# -- Kubernetes Service configuration
service:
  type: ClusterIP
  port: 3000
  annotations: {}

# =============================================================================
# Ingress (nginx / standard Kubernetes Ingress)
# Disable when using httpRoute (Gateway API) instead.
# =============================================================================
# -- Standard Kubernetes Ingress. Disable when using `httpRoute` instead.
ingress:
  enabled: true
  # -- IngressClass name (e.g. `nginx`, `traefik`)
  className: nginx
  # -- Extra Ingress annotations (e.g. `nginx.ingress.kubernetes.io/proxy-body-size: "50m"`)
  annotations: {}
  tls:
    # -- Enable TLS on the Ingress
    enabled: true
    # -- TLS Secret name (created by cert-manager or pre-existing)
    secretName: bowapp-cert
    # -- cert-manager ClusterIssuer name. Leave empty to skip the annotation.
    clusterIssuer: prod-cluster-issuer

# =============================================================================
# HTTPRoute — Kubernetes Gateway API
# Preferred for production clusters with Istio / Envoy Gateway.
# Set ingress.enabled=false when enabling this.
# =============================================================================
# -- Kubernetes Gateway API HTTPRoute. Set `ingress.enabled=false` when using this.
httpRoute:
  enabled: false
  # -- Gateway parentRefs (required when enabled)
  parentRefs: []
  # - name: prod-gateway
  #   namespace: gateway-system
  #   sectionName: https
  # -- Hostnames for the HTTPRoute
  hostnames: []

# =============================================================================
# Horizontal Pod Autoscaler
# =============================================================================
# -- Horizontal Pod Autoscaler. When enabled, the Deployment omits `replicas`.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# =============================================================================
# Pod Disruption Budget
# =============================================================================
# -- Pod Disruption Budget to limit voluntary disruptions
podDisruptionBudget:
  enabled: false
  # -- Minimum number of available pods during disruptions
  minAvailable: 1
  # maxUnavailable: 1

# =============================================================================
# Extra Volumes / VolumeMounts
# Added to the Deployment in addition to the bow-config.yaml mount.
# =============================================================================
# -- Extra volumes added to the Deployment (e.g. for custom TLS certs)
extraVolumes: []

# -- Extra volume mounts added to the main container
extraVolumeMounts: []

# =============================================================================
# groundhog2k postgres subchart
# Bundled for self-hosted convenience. For production, set enabled: false
# and supply BOW_DATABASE_URL via env[].
# Full schema: https://github.com/groundhog2k/helm-charts/tree/master/charts/postgres
# =============================================================================
# -- Bundled PostgreSQL (groundhog2k/postgres). For production use an external DB and set `enabled: false`.
postgres:
  enabled: true

  # -- PostgreSQL settings (superuser credentials)
  settings:
    superuserPassword:
      value: ""
    # Reference an existing Secret instead of plain values:
    # existingSecret: my-pg-secret

  # -- Application database and user created on first boot
  userDatabase:
    name:
      value: "bagofwords"
    user:
      value: "bow"
    password:
      value: ""

  # -- Persistent storage for PostgreSQL data
  storage:
    requestedSize: 20Gi
    className: ""

  # -- Node selector for the PostgreSQL pod
  nodeSelector: {}
  tolerations: []
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 512Mi
