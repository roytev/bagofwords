suite: service

templates:
  - service.yaml

tests:
  - it: renders exactly one Service
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - isAPIVersion:
          of: v1

  - it: names the Service with fullname
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-bagofwords

  - it: defaults to ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: uses LoadBalancer type when set
    set:
      service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: exposes port 3000 named http
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 3000
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.ports[0].targetPort
          value: http

  - it: sets selector using selectorLabels
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: bagofwords
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: sets service annotations when provided
    set:
      service.annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: nlb
    asserts:
      - equal:
          path: metadata.annotations["service.beta.kubernetes.io/aws-load-balancer-type"]
          value: nlb
