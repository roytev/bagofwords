suite: hpa

templates:
  - hpa.yaml

tests:
  - it: does not render HPA when autoscaling is disabled
    set:
      autoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders HPA when autoscaling is enabled
    set:
      autoscaling.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HorizontalPodAutoscaler
      - isAPIVersion:
          of: autoscaling/v2

  - it: names the HPA with fullname
    set:
      autoscaling.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-bagofwords

  - it: targets the Deployment with fullname
    set:
      autoscaling.enabled: true
    asserts:
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.name
          value: RELEASE-NAME-bagofwords

  - it: sets minReplicas and maxReplicas from values
    set:
      autoscaling.enabled: true
      autoscaling.minReplicas: 2
      autoscaling.maxReplicas: 10
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: renders CPU utilization metric when set
    set:
      autoscaling.enabled: true
      autoscaling.targetCPUUtilizationPercentage: 70
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 70
          any: true

  - it: renders memory utilization metric when set
    set:
      autoscaling.enabled: true
      autoscaling.targetMemoryUtilizationPercentage: 80
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 80
          any: true

  - it: renders both CPU and memory metrics when both are set
    set:
      autoscaling.enabled: true
      autoscaling.targetCPUUtilizationPercentage: 70
      autoscaling.targetMemoryUtilizationPercentage: 80
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: 70
          any: true
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 80
          any: true

  - it: sets standard labels
    set:
      autoscaling.enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: bagofwords
