suite: pdb

templates:
  - pdb.yaml

tests:
  - it: does not render PDB when disabled
    set:
      podDisruptionBudget.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders PDB when enabled
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodDisruptionBudget
      - isAPIVersion:
          of: policy/v1

  - it: names the PDB with fullname
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-bagofwords

  - it: uses selector labels matching the Deployment pods
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: bagofwords
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: sets minAvailable when configured
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 1
    asserts:
      - equal:
          path: spec.minAvailable
          value: 1
      - notExists:
          path: spec.maxUnavailable

  - it: sets maxUnavailable when minAvailable is not set
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 0
      podDisruptionBudget.maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1

  - it: accepts percentage string for minAvailable
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: "50%"
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"
