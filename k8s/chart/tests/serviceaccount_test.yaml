suite: serviceaccount

templates:
  - serviceaccount.yaml

tests:
  - it: renders ServiceAccount when create is true
    set:
      serviceAccount.create: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount

  - it: does not render ServiceAccount when create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: uses serviceAccount.name as the SA name
    set:
      serviceAccount.name: my-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa

  - it: sets standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: bagofwords

  - it: sets annotations when provided
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/bow-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789:role/bow-role

  - it: does not render imagePullSecrets when imagePullSecret is empty
    set:
      serviceAccount.imagePullSecret: ""
    asserts:
      - notExists:
          path: imagePullSecrets

  - it: renders imagePullSecrets when imagePullSecret is set
    set:
      serviceAccount.imagePullSecret: my-pull-secret
    asserts:
      - equal:
          path: imagePullSecrets[0].name
          value: my-pull-secret
