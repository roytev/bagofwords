suite: ingress

templates:
  - ingress.yaml

tests:
  - it: renders Ingress when enabled
    set:
      ingress.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
      - isAPIVersion:
          of: networking.k8s.io/v1

  - it: does not render Ingress when disabled
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: names the Ingress with fullname
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-bagofwords

  - it: sets ingressClassName from values
    set:
      ingress.enabled: true
      ingress.className: nginx
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: routes host to the bagofwords service on port http
    set:
      ingress.enabled: true
      host: bow.example.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: bow.example.com
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: RELEASE-NAME-bagofwords
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.name
          value: http

  - it: sets path type to Prefix
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix

  # ---------------------------------------------------------------------------
  # TLS
  # ---------------------------------------------------------------------------
  - it: renders TLS block when tls.enabled is true
    set:
      ingress.enabled: true
      ingress.tls.enabled: true
      ingress.tls.secretName: my-tls-secret
      host: bow.example.com
    asserts:
      - equal:
          path: spec.tls[0].hosts[0]
          value: bow.example.com
      - equal:
          path: spec.tls[0].secretName
          value: my-tls-secret

  - it: does not render TLS block when tls.enabled is false
    set:
      ingress.enabled: true
      ingress.tls.enabled: false
    asserts:
      - notExists:
          path: spec.tls

  # ---------------------------------------------------------------------------
  # cert-manager annotation
  # ---------------------------------------------------------------------------
  - it: adds cert-manager cluster-issuer annotation when clusterIssuer is set
    set:
      ingress.enabled: true
      ingress.tls.clusterIssuer: prod-cluster-issuer
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: prod-cluster-issuer

  - it: does not add cert-manager annotation when clusterIssuer is empty
    set:
      ingress.enabled: true
      ingress.tls.clusterIssuer: ""
    asserts:
      - notExists:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]

  # ---------------------------------------------------------------------------
  # Extra annotations
  # ---------------------------------------------------------------------------
  - it: merges extra ingress annotations
    set:
      ingress.enabled: true
      ingress.tls.clusterIssuer: ""
      ingress.annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-body-size"]
          value: "50m"
